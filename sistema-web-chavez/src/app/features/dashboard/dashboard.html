<div class="page-head"><div><h2>Dashboard</h2></div><div class="actions"><button class="btn" (click)="load()">Actualizar</button></div></div>
<div class="card"><div class="error" *ngIf="error">{{error}}</div><div class="muted" *ngIf="loading">Cargando...</div><div class="grid cards" *ngIf="!loading"><div class="kpi-card"><div class="kpi-value">{{indicadores.entregaCompleta | number:'1.2-2'}}%</div><div class="kpi-label">Entrega completa</div></div><div class="kpi-card"><div class="kpi-value">{{indicadores.entregaATiempo | number:'1.2-2'}}%</div><div class="kpi-label">Entrega a tiempo</div></div><div class="kpi-card"><div class="kpi-value">{{indicadores.compra | number:'1.2-2'}}%</div><div class="kpi-label">Compra</div></div><div class="kpi-card"><div class="kpi-value">{{indicadores.almacenInterno | number:'1.2-2'}}%</div><div class="kpi-label">Almacén interno</div></div></div></div>
