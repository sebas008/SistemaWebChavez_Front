<div class="page-head">
  <div>
    <h2>Almacenes</h2>
  </div>
  <div class="actions">
    <button class="btn" (click)="loadAll()">Actualizar</button>
    <button class="btn primary" (click)="openNew()">Nuevo</button>
  </div>
</div>

<div class="card">
  <div class="error" *ngIf="error">{{ error }}</div>
  <div class="muted" *ngIf="loading">Cargando…</div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Código</th>
          <th>Nombre</th>
          <th>Obra</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of rows">
          <td><span class="pill">{{ r.tipo }}</span></td>
          <td class="strong">{{ r.codigo }}</td>
          <td>{{ r.nombre }}</td>
          <td>{{ obtenerNombreObra(r.idObra) }}</td>
          <td>
            <span class="pill" [class.off]="!r.activo">
              {{ r.activo ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td class="right">
            <button class="link" (click)="openEdit(r)">Editar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal" *ngIf="modalOpen">
  <div class="modal-backdrop" (click)="closeModal()"></div>
  <div class="modal-card">
    <div class="modal-head">
      <div class="title">{{ editing ? 'Editar almacén' : 'Nuevo almacén' }}</div>
      <button class="icon" (click)="closeModal()">✕</button>
    </div>

    <div class="grid">
      <label *ngIf="!editing">
        Tipo
        <select [(ngModel)]="form.tipo">
          <option value="INTERNO">INTERNO</option>
          <option value="OBRA">OBRA</option>
        </select>
      </label>

      <label *ngIf="!editing">
        Código
        <input [(ngModel)]="form.codigo" />
      </label>

      <label class="span2" *ngIf="!editing && form.tipo === 'OBRA'">
        Obra
        <select [(ngModel)]="form.idObra">
          <option [ngValue]="null">-- Seleccionar --</option>
          <option *ngFor="let o of obras" [ngValue]="o.idObra">
            {{ o.codigo }} - {{ o.nombre }}
          </option>
        </select>
      </label>

      <label class="span2">
        Nombre
        <input [(ngModel)]="form.nombre" />
      </label>

      <label class="span2" *ngIf="editing">
        Activo
        <select [(ngModel)]="form.activo">
          <option [ngValue]="true">Sí</option>
          <option [ngValue]="false">No</option>
        </select>
      </label>
    </div>

    <div class="modal-actions">
      <button class="btn" (click)="closeModal()">Cancelar</button>
      <button class="btn primary" (click)="save()">Guardar</button>
    </div>
  </div>
</div>
