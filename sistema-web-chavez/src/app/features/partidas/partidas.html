<div class="page-head">
  <div><h2>Partidas</h2></div>
  <div class="actions">
    <button class="btn" (click)="load()">Actualizar</button>
    <button class="btn primary" (click)="openNew()">Nuevo</button>
  </div>
</div>

<div class="card">
  <div class="error" *ngIf="error">{{ error }}</div>
  <div class="muted" *ngIf="loading">Cargando…</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nombre</th><th>Estado</th><th></th></tr></thead>
      <tbody>
        <tr *ngFor="let r of rows">
          <td class="strong">{{ r.nombre }}</td>
          <td><span class="pill" [class.off]="!r.activo">{{ r.activo ? 'Activa' : 'Inactiva' }}</span></td>
          <td class="right"><button class="link" (click)="openEdit(r)">Editar</button></td>
        </tr>
        <tr *ngIf="!loading && rows.length === 0"><td colspan="3" class="muted">Sin registros.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal" *ngIf="modalOpen">
  <div class="modal-backdrop" (click)="closeModal()"></div>
  <div class="modal-card">
    <div class="modal-head"><div class="title">{{ editing ? 'Editar partida' : 'Nueva partida' }}</div><button class="icon" (click)="closeModal()">✕</button></div>
    <div class="grid">
      <label class="span2">Nombre<input [(ngModel)]="form.nombre" placeholder="Nombre de la partida" /></label>
      <label class="span2" *ngIf="editing">Activa<select [(ngModel)]="form.activo"><option [ngValue]="true">Sí</option><option [ngValue]="false">No</option></select></label>
    </div>
    <div class="modal-actions"><button class="btn" (click)="closeModal()">Cancelar</button><button class="btn primary" (click)="save()">Guardar</button></div>
  </div>
</div>
