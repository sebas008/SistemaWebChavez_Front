<div class="page-head">
  <div><h2>Unidades de medida</h2></div>
  <div class="actions">
    <button class="btn" (click)="load()">Actualizar</button>
    <button class="btn primary" (click)="openNew()">Nuevo</button>
  </div>
</div>

<div class="card">
  <div class="error" *ngIf="error">{{ error }}</div>
  <div class="muted" *ngIf="loading">Cargando…</div>
  <div class="table-wrap">
    <table *ngIf="!loading">
      <thead>
        <tr>
          <th>Código</th>
          <th>Nombre</th>
          <th>Estado</th>
          <th class="right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of rows">
          <td class="strong">{{ r.codigo }}</td>
          <td>{{ r.nombre }}</td>
          <td><span class="pill" [class.off]="!r.activo">{{ r.activo ? 'Activa' : 'Inactiva' }}</span></td>
          <td class="right"><button class="link" (click)="openEdit(r)">Editar</button></td>
        </tr>
        <tr *ngIf="rows.length === 0"><td colspan="4" class="muted">Sin registros.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal" *ngIf="modalOpen">
  <div class="modal-backdrop" (click)="closeModal()"></div>
  <div class="modal-card">
    <div class="modal-head">
      <div class="title">{{ editing ? 'Editar unidad de medida' : 'Nueva unidad de medida' }}</div>
      <button class="icon" (click)="closeModal()">✕</button>
    </div>
    <div class="grid">
      <label>
        Código
        <input [(ngModel)]="form.codigo" />
      </label>
      <label class="span2">
        Nombre
        <input [(ngModel)]="form.nombre" />
      </label>
      <label class="span2" *ngIf="editing">
        <input type="checkbox" [(ngModel)]="form.activo" />
        Activa
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn" (click)="closeModal()">Cancelar</button>
      <button class="btn primary" (click)="save()">Guardar</button>
    </div>
  </div>
</div>
