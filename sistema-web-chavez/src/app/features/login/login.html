<div class="wrap">
  <div class="card">
    <div class="brand">
      <img src="/assets/logo.png" alt="A. Chavez" />
      <div>
        <div class="t1">A. Chavez</div>
        <div class="t2">Constructores</div>
      </div>
    </div>

    <h1>Ingresar</h1>
    <p class="muted">Accede con tu usuario y contraseña.</p>

    <form (ngSubmit)="submit()" class="form">
      <label>
        Usuario
        <input [(ngModel)]="usuario" name="usuario" autocomplete="username" />
      </label>

      <label>
        Contraseña
        <input [(ngModel)]="password" name="password" type="password" autocomplete="current-password" />
      </label>

      <div class="error" *ngIf="error">{{ error }}</div>

      <button class="btn" type="submit" [disabled]="loading">
        {{ loading ? 'Ingresando…' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
