<div class="page-head"><div><h2>Compras</h2></div><div class="actions"><button class="btn" (click)="load()">Actualizar</button></div></div><div class="card"><div class="error" *ngIf="error">{{error}}</div><div class="muted" *ngIf="loading">Cargando...</div><div class="table-wrap" *ngIf="!loading"><table><thead><tr><th>NRO REQ</th><th>NOM OBRA</th><th>ÍTEM SELECCIONADO</th><th>CANTIDAD</th><th>FECHA</th><th>ESTADO</th><th></th></tr></thead><tbody><tr *ngFor="let r of rows"><td><b>{{r.nroReq}}</b></td><td>{{r.nomObra}}</td><td>{{r.item}}</td><td>{{r.cantidad}}</td><td>{{formatearFecha(r.fecha)}}</td><td><span class="pill">{{r.estado}}</span></td><td class="right"><button class="btn sm" (click)="openCambiarEstado(r)">Cambiar estado</button></td></tr><tr *ngIf="rows.length===0"><td colspan="7" class="muted">Sin registros.</td></tr></tbody></table></div></div><div class="modal" *ngIf="estadoOpen"><div class="modal-backdrop" (click)="closeEstado()"></div><div class="modal-card"><div class="modal-head"><div class="title">Cambiar estado</div><button class="icon" (click)="closeEstado()">✕</button></div><div class="grid"><label class="span2">Nuevo estado<select [(ngModel)]="nuevoEstado"><option *ngFor="let e of estados" [ngValue]="e">{{e}}</option></select></label><label class="span2" *ngIf="nuevoEstado==='ENTREGADO'">¿La entrega fue a tiempo?<select [(ngModel)]="entregaATiempo"><option [ngValue]="null">-- Seleccionar --</option><option [ngValue]="true">Sí</option><option [ngValue]="false">No</option></select></label></div><div class="modal-actions"><button class="btn" (click)="closeEstado()">Cancelar</button><button class="btn primary" (click)="guardarEstado()">Guardar</button></div></div></div>
